services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "80"
    environment:
      APP_NAME: ${APP_NAME:-Condominio Threads}
      APP_ENV: ${APP_ENV:-production}
      APP_KEY: ${APP_KEY:?APP_KEY is required}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL:?APP_URL is required}
      ASSET_URL: ${ASSET_URL:-}

      APP_LOCALE: ${APP_LOCALE:-pt_BR}
      APP_FALLBACK_LOCALE: ${APP_FALLBACK_LOCALE:-pt_BR}
      APP_FAKER_LOCALE: ${APP_FAKER_LOCALE:-pt_BR}

      LOG_CHANNEL: ${LOG_CHANNEL:-errorlog}
      LOG_LEVEL: ${LOG_LEVEL:-info}

      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DB:-condominio_threads}
      DB_USERNAME: ${POSTGRES_USER:-condominio}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}

      SESSION_DRIVER: database
      SESSION_LIFETIME: ${SESSION_LIFETIME:-120}
      CACHE_STORE: database
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-database}

      MAIL_MAILER: ${MAIL_MAILER:-log}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-rapha@raphael-martins.com}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-Condominio Threads}

      THREADS_APP_ID: ${THREADS_APP_ID:-}
      THREADS_APP_SECRET: ${THREADS_APP_SECRET:-}
      THREADS_REDIRECT_URI: ${THREADS_REDIRECT_URI:-}
      THREADS_GRAPH_BASE: ${THREADS_GRAPH_BASE:-https://graph.threads.net/v1.0}
      THREADS_MOCK: ${THREADS_MOCK:-true}

      MERCADO_PAGO_ACCESS_TOKEN: ${MERCADO_PAGO_ACCESS_TOKEN:-}
      MERCADO_PAGO_PUBLIC_KEY: ${MERCADO_PAGO_PUBLIC_KEY:-}
      MERCADO_PAGO_WEBHOOK_SECRET: ${MERCADO_PAGO_WEBHOOK_SECRET:-}
      MERCADO_PAGO_MOCK: ${MERCADO_PAGO_MOCK:-true}
      MERCADO_PAGO_PREMIUM_PRICE: ${MERCADO_PAGO_PREMIUM_PRICE:-9.90}

      VITE_APP_NAME: ${APP_NAME:-Condominio Threads}

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-condominio_threads}
      POSTGRES_USER: ${POSTGRES_USER:-condominio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  postgres_data:
